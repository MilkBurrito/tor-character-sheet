<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tino Arcano — The One Ring</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: #8a7233;
  --gold-bright: #e8d48b;
  --parchment: #1a1611;
  --parchment-light: #2a2319;
  --ink: #d4c5a0;
  --ink-dim: #8a7e66;
  --ink-bright: #f0e6cc;
  --red: #8b3a3a;
  --red-bright: #c45050;
  --green: #4a7a4a;
  --green-bright: #6aaa6a;
  --blue: #4a6a8a;
  --blue-bright: #6a9aba;
  --panel-bg: rgba(20,16,10,0.85);
  --panel-border: rgba(201,168,76,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(74,106,138,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.app-container {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding: 12px;
  min-height: 100vh;
}
 
/* TOP BAR */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 1px solid var(--panel-border); margin-bottom: 4px;
  gap: 8px;
}
.desktop-nav { display: flex; gap: 6px; align-items: center; }
.top-bar .char-name {
  font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 700;
  color: var(--gold); letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
  flex: 1; text-align: center; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.top-bar .char-name:hover { color: var(--gold-bright); }
.menu-btn {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 0.75rem;
  cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s;
}
.menu-btn:hover { border-color: var(--gold); color: var(--gold); }
 
/* ===== CELTIC KNOTWORK ORNAMENTS ===== */
.celtic-ornament { width: 100%; color: var(--gold); padding: 0 10%; }
.celtic-ornament svg { width: 100%; height: 16px; }
 
/* Knotwork corner accents on portrait */
.portrait-frame::after {
  content: ''; position: absolute; inset: -1px; z-index: 2; pointer-events: none;
  background:
    linear-gradient(135deg, var(--gold-dim) 6px, transparent 6px) top left,
    linear-gradient(225deg, var(--gold-dim) 6px, transparent 6px) top right,
    linear-gradient(315deg, var(--gold-dim) 6px, transparent 6px) bottom right,
    linear-gradient(45deg, var(--gold-dim) 6px, transparent 6px) bottom left;
  background-size: 50% 50%; background-repeat: no-repeat;
  opacity: 0.5;
}
 
/* Ornamental dividers with Celtic knot center */
.divider {
  width: 100%; height: 18px; position: relative;
  display: flex; align-items: center; justify-content: center;
  margin: 10px 0;
}
.divider::before {
  content: ''; position: absolute; left: 5%; right: 5%; top: 50%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 20%, var(--gold-dim) 80%, transparent);
  opacity: 0.35;
}
.divider::after {
  content: '\2726\2009\2727\2009\2726'; position: relative; z-index: 1;
  color: var(--gold-dim); font-size: 0.45rem; background: #15120d; padding: 0 10px;
  letter-spacing: 3px; opacity: 0.5;
}
 
/* Section titles with ornamental lines */
.section-title {
  font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--gold-dim);
  letter-spacing: 3px; text-transform: uppercase; text-align: center; margin: 14px 0 10px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.section-title::before, .section-title::after {
  content: ''; flex: 1; height: 1px; max-width: 50px;
  background: linear-gradient(90deg, transparent, var(--gold-dim)); opacity: 0.3;
}
.section-title::after { background: linear-gradient(90deg, var(--gold-dim), transparent); }
 
/* ===== BOTTOM NAVBAR (mobile) ===== */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, #0d0b08, #1a1611);
  border-top: 1px solid var(--panel-border);
  padding: 6px 8px env(safe-area-inset-bottom, 0px);
  z-index: 200; justify-content: space-around; align-items: flex-end;
}
.bnav-btn {
  background: none; border: none; color: var(--gold-dim);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  cursor: pointer; padding: 4px 6px; transition: all 0.2s;
}
.bnav-btn span {
  font-family: 'Cinzel', serif; font-size: 0.4rem; letter-spacing: 1px;
  text-transform: uppercase;
}
.bnav-btn:active { color: var(--gold-bright); }
.bnav-center { position: relative; }
.bnav-diamond {
  width: 34px; height: 34px; transform: rotate(45deg);
  border: 1.5px solid var(--gold-dim); background: var(--panel-bg);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 2px; transition: all 0.3s;
}
.bnav-diamond svg { transform: rotate(-45deg); }
.bnav-center:active .bnav-diamond {
  border-color: var(--gold-bright); box-shadow: 0 0 12px rgba(201,168,76,0.3);
}
 
/* Background customization */
.bg-custom {
  position: fixed; inset: 0; z-index: -1;
  background-size: cover; background-position: center;
}
.bg-custom::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(26,22,17,var(--bg-overlay-opacity, 0.88));
}
 
/* MAIN GRID */
.main-grid {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) minmax(280px, 420px) minmax(120px, 1fr);
  gap: 20px;
  align-items: start;
}
 
/* ===== TRI-DIAMOND CLUSTER (Attribute) ===== */
.attr-cluster {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  padding: 10px 0;
}
.attr-cluster:hover .main-diamond .d-shape { border-color: var(--gold); box-shadow: 0 0 18px rgba(201,168,76,0.3); }
.attr-cluster:hover .sub-diamond .d-shape { border-color: var(--gold); }
.attr-cluster.active .main-diamond .d-shape { border-color: var(--gold-bright); box-shadow: 0 0 22px rgba(201,168,76,0.4); background: rgba(201,168,76,0.08); }
 
.attr-label {
  font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--ink-dim);
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;
}
 
/* Main TN diamond */
.main-diamond {
  position: relative; width: 62px; height: 62px;
}
.main-diamond .d-shape {
  width: 100%; height: 100%; transform: rotate(45deg);
  border: 2px solid var(--gold-dim); background: var(--panel-bg);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.main-diamond .d-val {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold-bright);
  font-weight: 700;
}
.main-diamond .d-sublabel {
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 0.4rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; white-space: nowrap;
}
 
/* Sub diamonds (Rating + Endurance/Hope/Parry) */
.sub-diamonds {
  display: flex; gap: 24px; margin-top: -6px;
}
.sub-diamond {
  position: relative; width: 38px; height: 38px;
}
.sub-diamond .d-shape {
  width: 100%; height: 100%; transform: rotate(45deg);
  border: 1.5px solid var(--gold-dim); background: var(--panel-bg);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.sub-diamond .d-val {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold);
  font-weight: 600;
}
.sub-diamond .d-sublabel {
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 0.35rem; color: var(--ink-dim);
  letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
}
 
/* ATTRIBUTES LEFT */
.attributes-left {
  grid-column: 1; grid-row: 1;
  display: flex; flex-direction: column; gap: 30px;
  align-items: flex-end; padding-top: 20px;
}
 
/* ATTRIBUTES RIGHT */
.attributes-right {
  grid-column: 3; grid-row: 1;
  display: flex; flex-direction: column; gap: 30px;
  align-items: flex-start; padding-top: 20px;
}
 
/* ===== EQUIP DIAMOND (with image) ===== */
.equip-diamond {
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; position: relative; padding: 10px 0;
}
.equip-diamond .eq-shape {
  width: 56px; height: 56px; transform: rotate(45deg);
  border: 2px solid var(--gold-dim); background: var(--panel-bg);
  overflow: hidden; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.equip-diamond:hover .eq-shape { border-color: var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.3); }
.equip-diamond.active .eq-shape { border-color: var(--gold-bright); box-shadow: 0 0 20px rgba(201,168,76,0.4); }
.equip-diamond .eq-icon {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--gold);
  letter-spacing: 1px; text-align: center; font-weight: 600; line-height: 1.1;
}
.equip-diamond .eq-img {
  width: 140%; height: 140%; object-fit: cover; transform: rotate(-45deg) scale(1.2);
  filter: sepia(0.2) contrast(1.1);
}
.equip-diamond .eq-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 10px;
}
 
/* PORTRAIT */
.portrait-section {
  grid-column: 2; grid-row: 1;
  display: flex; flex-direction: column; align-items: center;
}
.portrait-frame {
  position: relative; width: 240px; height: 340px; overflow: hidden;
  border: 2px solid var(--gold-dim);
  box-shadow: 0 0 30px rgba(201,168,76,0.15), inset 0 0 20px rgba(0,0,0,0.5);
  cursor: pointer;
}
.portrait-frame::before {
  content: ''; position: absolute; inset: 3px;
  border: 1px solid rgba(201,168,76,0.2); z-index: 2; pointer-events: none;
}
.portrait-frame img {
  width: 100%; height: 100%; object-fit: cover; object-position: top center;
  filter: sepia(0.1) contrast(1.05);
}
.portrait-frame .change-hint {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); color: var(--gold-dim);
  font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; padding: 6px;
  opacity: 0; transition: opacity 0.3s; z-index: 3;
}
.portrait-frame:hover .change-hint { opacity: 1; }
.portrait-title {
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold-dim);
  letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; text-align: center;
}
 
/* Resource bars */
.resource-section {
  display: flex; flex-direction: column; gap: 10px; align-items: center;
  margin-top: 16px; width: 100%;
}
.resource-bar {
  display: flex; align-items: center; gap: 10px; cursor: pointer; width: 100%;
  max-width: 500px;
}
.resource-bar .rb-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; min-width: 75px; text-align: right;
}
.resource-bar .rb-track {
  flex: 1; height: 8px; background: rgba(201,168,76,0.1);
  border: 1px solid var(--panel-border); position: relative; overflow: hidden;
}
.resource-bar .rb-fill { height: 100%; transition: width 0.5s; }
.rb-fill.endurance { background: linear-gradient(90deg, var(--green), var(--green-bright)); }
.rb-fill.hope { background: linear-gradient(90deg, var(--blue), var(--blue-bright)); }
.resource-bar .rb-val {
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--ink);
  min-width: 55px; text-align: left;
}
 
/* BOTTOM SECTION */
.bottom-section { grid-column: 1 / -1; }
.divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--panel-border), transparent); margin: 12px 0; }
.condition-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.condition-toggle {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 4px 8px; border: 1px solid transparent; transition: all 0.2s;
}
.condition-toggle:hover { border-color: var(--panel-border); }
.condition-toggle .ct-box {
  width: 12px; height: 12px; border: 1px solid var(--gold-dim);
  transform: rotate(45deg); transition: all 0.2s;
}
.condition-toggle.active .ct-box { background: var(--red-bright); border-color: var(--red-bright); box-shadow: 0 0 6px rgba(196,80,80,0.4); }
.condition-toggle .ct-label {
  font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--ink-dim);
  letter-spacing: 1px; text-transform: uppercase;
}
.condition-toggle.active .ct-label { color: var(--red-bright); }
 
/* ===== SLIDE PANEL ===== */
.panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 199;
  opacity: 0; visibility: hidden; transition: all 0.3s;
}
.panel-overlay.open { opacity: 1; visibility: visible; }
.slide-panel {
  position: fixed; bottom: 0; left: 0; right: 0; max-height: 80vh;
  background: linear-gradient(to bottom, #1e1a13, #15120d);
  border-top: 2px solid var(--gold-dim); z-index: 201;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto; padding: 0 16px 40px;
  visibility: hidden;
}
.slide-panel.open { transform: translateY(0); visibility: visible; }
.panel-header {
  position: sticky; top: 0;
  background: #1e1a13;
  padding: 16px 0 12px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--panel-border); margin-bottom: 16px; z-index: 5;
}
.panel-title {
  font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold);
  letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
}
.panel-close {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  width: 32px; height: 32px; cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.panel-close:hover { border-color: var(--gold); color: var(--gold); }
 
/* Stat rows */
.stat-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.stat-row:last-child { border-bottom: none; }
.stat-name {
  font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink);
  display: flex; align-items: center; gap: 10px;
}
.stat-controls { display: flex; align-items: center; gap: 6px; }
.stat-val {
  font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-bright);
  min-width: 28px; text-align: center; font-weight: 600;
}
.stat-btn {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  width: 28px; height: 28px; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: 'Cinzel', serif;
}
.stat-btn:hover { border-color: var(--gold); color: var(--gold); }
.stat-btn:active { background: rgba(201,168,76,0.15); }
 
/* Favoured checkbox */
.favour-check {
  width: 16px; height: 16px; transform: rotate(45deg);
  border: 1px solid var(--gold-dim); background: none; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0; appearance: none; -webkit-appearance: none;
}
.favour-check:checked { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.4); }
 
/* Mini diamonds in panel */
.mini-diamonds { display: flex; gap: 24px; justify-content: center; margin: 8px 0 20px; padding: 8px 0; }
.mini-diamond { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.mini-diamond .md-shape {
  width: 44px; height: 44px; transform: rotate(45deg);
  border: 1.5px solid var(--gold-dim); background: var(--panel-bg);
  display: flex; align-items: center; justify-content: center;
}
.mini-diamond .md-val {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-bright); font-weight: 700;
}
.mini-diamond .md-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 6px;
}
 
/* Skill dots */
.skill-dots { display: flex; gap: 3px; align-items: center; }
.skill-dot {
  width: 10px; height: 10px; transform: rotate(45deg);
  border: 1px solid var(--gold-dim); cursor: pointer; transition: all 0.2s;
}
.skill-dot.filled { background: var(--gold); }
.skill-dot:hover { border-color: var(--gold-bright); }
.prof-dots { display: flex; gap: 2px; }
.prof-dot {
  width: 8px; height: 8px; transform: rotate(45deg);
  border: 1px solid var(--gold-dim); cursor: pointer; transition: all 0.2s;
}
.prof-dot.filled { background: var(--gold); }
 
.section-title {
  font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--gold-dim);
  letter-spacing: 3px; text-transform: uppercase; text-align: center; margin: 12px 0 8px;
}
.info-field {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.info-label {
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase;
}
.info-value {
  font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink-bright);
  background: none; border: none; border-bottom: 1px solid transparent;
  text-align: right; padding: 2px 4px; max-width: 60%; transition: all 0.2s;
}
.info-value:focus { outline: none; border-bottom-color: var(--gold-dim); color: var(--gold-bright); }
 
/* Image upload button in panel */
.img-upload-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.img-upload-btn {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  padding: 5px 12px; font-family: 'Cinzel', serif; font-size: 0.65rem;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
}
.img-upload-btn:hover { border-color: var(--gold); color: var(--gold); }
.img-clear-btn {
  background: none; border: 1px solid rgba(139,58,58,0.4); color: var(--red);
  padding: 5px 10px; font-family: 'Cinzel', serif; font-size: 0.6rem;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; margin-left: 6px;
}
.img-clear-btn:hover { border-color: var(--red-bright); color: var(--red-bright); }
 
/* Character list item hover */
.stat-row[style*="cursor:pointer"]:hover {
  background: rgba(201,168,76,0.05);
}
 
/* Scrollbar */
.slide-panel::-webkit-scrollbar { width: 4px; }
.slide-panel::-webkit-scrollbar-track { background: var(--parchment); }
.slide-panel::-webkit-scrollbar-thumb { background: var(--gold-dim); }
 
/* Hidden file input */
.hidden-input { display: none; }
 
/* RESPONSIVE */
@media (max-width: 768px) {
  .main-grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .portrait-section { grid-column: 1; grid-row: 1; }
  .attributes-left {
    grid-column: 1; grid-row: 2;
    flex-direction: row; justify-content: center; align-items: flex-start;
    gap: 28px; padding-top: 0;
  }
  .attributes-right {
    grid-column: 1; grid-row: 3;
    flex-direction: row; justify-content: center; align-items: flex-start;
    gap: 28px; padding-top: 0; flex-wrap: wrap;
  }
  .bottom-section { grid-column: 1; grid-row: 4; }
  .portrait-frame { width: 200px; height: 280px; }
  .main-diamond { width: 52px; height: 52px; }
  .main-diamond .d-val { font-size: 1rem; }
  .sub-diamond { width: 32px; height: 32px; }
  .sub-diamond .d-val { font-size: 0.75rem; }
  .sub-diamonds { gap: 18px; }
  .top-bar .char-name { font-size: 1rem; letter-spacing: 2px; }
  .equip-diamond .eq-shape { width: 48px; height: 48px; }
  .desktop-nav { display: none !important; }
  .bottom-nav { display: flex; }
  .app-container { padding-bottom: 72px; }
  .slide-panel { max-height: calc(100vh - 140px); bottom: 60px; }
  .top-bar { border-bottom: none; margin-bottom: 0; justify-content: center; }
}
</style>
</head>
<body>
 
<div class="bg-custom" id="bg-custom"></div>
 
<div class="app-container" id="app">
  <!-- TOP BAR (desktop) -->
  <div class="top-bar">
    <div class="desktop-nav">
      <button class="menu-btn" onclick="openPanel('characters')">Characters</button>
      <button class="menu-btn" onclick="openPanel('status')">Status</button>
    </div>
    <span class="char-name" onclick="openPanel('info')">NEW CHARACTER</span>
    <div class="desktop-nav">

<script>
// ===== MULTI-CHARACTER STORAGE =====
const LIST_KEY = 'tor_characters_list';    // array of {id, name}
const ACTIVE_KEY = 'tor_active_character'; // id string
const OLD_DATA_KEY = 'tor_tino_character'; // for migration
const OLD_IMG_KEY = 'tor_tino_images';     // for migration
 
function getCharList() {
  try { const s = localStorage.getItem(LIST_KEY); if(s) return JSON.parse(s); } catch(e){}
  return [];
}
function saveCharList(list) {
  try { localStorage.setItem(LIST_KEY, JSON.stringify(list)); } catch(e){}
}
function getActiveId() {
  return localStorage.getItem(ACTIVE_KEY) || null;
}
function setActiveId(id) {
  localStorage.setItem(ACTIVE_KEY, id);
}
function charDataKey(id) { return 'tor_char_'+id+'_data'; }
function charImgKey(id) { return 'tor_char_'+id+'_images'; }
 
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2,5);
}
 
// Migrate old single-character data if it exists
function migrateOldData() {
  const list = getCharList();
  if(list.length > 0) return; // already migrated or has characters
  const oldData = localStorage.getItem(OLD_DATA_KEY);
  const oldImgs = localStorage.getItem(OLD_IMG_KEY);
  if(oldData) {
    const id = generateId();
    let parsed;
    try { parsed = JSON.parse(oldData); } catch(e){ return; }
    const name = parsed.name || 'Migrated Character';
    localStorage.setItem(charDataKey(id), oldData);
    if(oldImgs) localStorage.setItem(charImgKey(id), oldImgs);
    saveCharList([{id, name}]);
    setActiveId(id);
    // Clean up old keys
    localStorage.removeItem(OLD_DATA_KEY);
    localStorage.removeItem(OLD_IMG_KEY);
  }
}
 
migrateOldData();
 
// Ensure at least one character exists
function ensureCharacter() {
  let list = getCharList();
  if(list.length === 0) {
    const id = generateId();
    list.push({id, name:'New Character'});
    saveCharList(list);
    setActiveId(id);
  }
  if(!getActiveId()) setActiveId(list[0].id);
}
ensureCharacter();
 
let currentCharId = getActiveId();
 
const defaultData = {
  name: '', culture: '', blessing: '', calling: '', shadowPath: '',
  standardOfLiving: '', patron: '', distinctiveFeatures: '', treasure: 0,
  age: '', flaws: '', backstory: '',
  strength: { tn: 0, rating: 0, endurance: 0 },
  heart: { tn: 0, rating: 0, hope: 0 },
  wits: { tn: 0, rating: 0, parry: 0 },
  currentEndurance: 0, maxEndurance: 0, fatigue: 0, load: 0,
  currentHope: 0, maxHope: 0, shadowPoints: 0, shadowScars: 0,
  adventurePoints: 0, skillPoints: 0, fellowshipScore: 0,
  valour: 0, wisdom: 0,
  skills: {
    awe:{favoured:false,rank:0}, athletics:{favoured:false,rank:0},
    awareness:{favoured:false,rank:0}, hunting:{favoured:false,rank:0},
    song:{favoured:false,rank:0}, craft:{favoured:false,rank:0},
    enhearten:{favoured:false,rank:0}, travel:{favoured:false,rank:0},
    insight:{favoured:false,rank:0}, healing:{favoured:false,rank:0},
    courtesy:{favoured:false,rank:0}, battle:{favoured:false,rank:0},
    persuade:{favoured:false,rank:0}, stealth:{favoured:false,rank:0},
    scan:{favoured:false,rank:0}, explore:{favoured:false,rank:0},
    riddle:{favoured:false,rank:0}, lore:{favoured:false,rank:0},
  },
  proficiencies: { axes:0, bows:0, spears:0, swords:0 },
  warGear: [
    { name:'', damage:0, injury:0, load:0, notes:'' },
    { name:'', damage:0, injury:0, load:0, notes:'' },
    { name:'', damage:0, injury:0, load:0, notes:'' },
    { name:'', damage:0, injury:0, load:0, notes:'' },
  ],
  armour: { name:'', protection:0, load:0 },
  helm: { name:'', protection:0, load:0 },
  shield: { name:'', parry:0, load:0 },
  mount: { name:'', vigour:0, speed:0, notes:'' },
  rewards: '', virtues: '', travellingGear: '', backstory: '',
  conditions: { weary:false, miserable:false, wounded:false, injury:'' },
};
 
let data = loadData();
let images = loadImages();
 
function loadData() {
  try { const s = localStorage.getItem(charDataKey(currentCharId)); if(s) return JSON.parse(s); } catch(e){}
  return JSON.parse(JSON.stringify(defaultData));
}
function loadImages() {
  try { const s = localStorage.getItem(charImgKey(currentCharId)); if(s) return JSON.parse(s); } catch(e){}
  return { portrait: null, armour: null, weapons: null, shield: null, travel: null };
}
function saveData() {
  try { localStorage.setItem(charDataKey(currentCharId), JSON.stringify(data)); } catch(e){}
  // Keep the character list name in sync
  const list = getCharList();
  const entry = list.find(c => c.id === currentCharId);
  if(entry && data.name && entry.name !== data.name) {
    entry.name = data.name;
    saveCharList(list);
  }
  updateDisplay();
}
function saveImages() {

// Switch to a different character
function switchCharacter(id) {
  currentCharId = id;
  setActiveId(id);
  data = loadData();
  images = loadImages();
  renderAttrDiamonds();
  renderEquipDiamonds();
  updateDisplay();
  closePanel();
}
 
// Create a new character
function createNewCharacter() {
  const id = generateId();
  const list = getCharList();
  list.push({id, name:'New Character'});
  saveCharList(list);
  switchCharacter(id);
}
 
// Delete a character
function deleteCharacter(id) {
  if(!confirm('Permanently delete this character?')) return;
  let list = getCharList();
  list = list.filter(c => c.id !== id);
  saveCharList(list);
  localStorage.removeItem(charDataKey(id));
  localStorage.removeItem(charImgKey(id));
  if(list.length === 0) {
    createNewCharacter();
  } else if(currentCharId === id) {
    switchCharacter(list[0].id);
  } else {
    openPanel('characters');
  }
}
 
// ===== IMAGE HANDLING =====
function triggerPortraitUpload() { document.getElementById('portrait-upload').click(); }
 
function handlePortraitUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    // Resize for storage
    resizeImage(ev.target.result, 400, 550, function(resized) {
      images.portrait = resized;
      saveImages();
      document.getElementById('portrait-img').src = resized;
    });
  };
  reader.readAsDataURL(file);
}
 
function handleEquipImgUpload(e, key) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    resizeImage(ev.target.result, 120, 120, function(resized) {
      images[key] = resized;
      saveImages();
      renderEquipDiamonds();
    });
  };
  reader.readAsDataURL(file);
}
 
function resizeImage(dataUrl, maxW, maxH, cb) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    let w = img.width, h = img.height;
    if(w > maxW) { h = h*(maxW/w); w = maxW; }
    if(h > maxH) { w = w*(maxH/h); h = maxH; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', 0.7));
  };
  img.src = dataUrl;
}

function numStat(label, get, set, parent) {
  const row = document.createElement('div'); row.className='stat-row';
  row.innerHTML=`<span class="stat-name">${label}</span>
    <div class="stat-controls">
      <button class="stat-btn" data-dir="-1">\u2212</button>
      <span class="stat-val">${get()}</span>
      <button class="stat-btn" data-dir="1">+</button>
    </div>`;
  row.querySelectorAll('.stat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      set(get()+parseInt(btn.dataset.dir));
      row.querySelector('.stat-val').textContent=get();
      saveData();
    });
  });
  parent.appendChild(row);
}
 
function skillRow(key, parent) {
  const s=data.skills[key]; const row=document.createElement('div'); row.className='stat-row';
  const label=key.charAt(0).toUpperCase()+key.slice(1);
  let dots='';for(let i=0;i<6;i++) dots+=`<div class="skill-dot ${i<s.rank?'filled':''}" data-idx="${i}"></div>`;
  row.innerHTML=`<span class="stat-name"><input type="checkbox" class="favour-check" ${s.favoured?'checked':''}>${label}</span><div class="skill-dots">${dots}</div>`;
  row.querySelector('.favour-check').addEventListener('change',e=>{data.skills[key].favoured=e.target.checked;saveData();});
  row.querySelectorAll('.skill-dot').forEach(dot=>{
    dot.addEventListener('click',()=>{
      const idx=parseInt(dot.dataset.idx);
      data.skills[key].rank=(idx+1===s.rank)?idx:idx+1;
      saveData();
      row.querySelectorAll('.skill-dot').forEach((d,i)=>d.classList.toggle('filled',i<data.skills[key].rank));

        <div class="ct-box"></div></div>`;

      data.conditions[c]=!data.conditions[c];
      e.currentTarget.classList.toggle('active');

  content.appendChild(injRow);
}
 
// ===== BACKGROUND HANDLING =====
const BG_KEY = 'tor_app_background';
const BG_OPACITY_KEY = 'tor_app_bg_opacity';
 
function loadBackground() {
  const bgData = localStorage.getItem(BG_KEY);
  const opacity = localStorage.getItem(BG_OPACITY_KEY) || '0.88';
  const el = document.getElementById('bg-custom');
  if(bgData) {
    el.style.backgroundImage = 'url('+bgData+')';
  }
  document.documentElement.style.setProperty('--bg-overlay-opacity', opacity);
}
 
function handleBgUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    resizeImage(ev.target.result, 1200, 1200, function(resized) {
      try { localStorage.setItem(BG_KEY, resized); } catch(e){ alert('Image too large for storage'); return; }
      loadBackground();
      if(currentPanel === 'settings') openPanel('settings');
    });
  };
  reader.readAsDataURL(file);
}
 
function clearBackground() {
  localStorage.removeItem(BG_KEY);
  document.getElementById('bg-custom').style.backgroundImage = 'none';
  if(currentPanel === 'settings') openPanel('settings');
}
 
function setBgOpacity(val) {
  localStorage.setItem(BG_OPACITY_KEY, val);
  document.documentElement.style.setProperty('--bg-overlay-opacity', val);
}
 
// ===== SETTINGS PANEL =====
function buildSettings(content) {
  const st1 = document.createElement('div'); st1.className='section-title'; st1.textContent='Background Image';
  content.appendChild(st1);
 
  const hasBg = !!localStorage.getItem(BG_KEY);
  const bgRow = document.createElement('div'); bgRow.className='img-upload-row';
  bgRow.innerHTML=`<span class="info-label">Custom Background</span>
    <div style="display:flex;gap:6px;">
      <button class="img-upload-btn" onclick="document.getElementById('upload-bg').click()">Upload</button>
      ${hasBg?'<button class="img-clear-btn" onclick="clearBackground()">Clear</button>':''}
    </div>`;
  content.appendChild(bgRow);
 
  // Overlay opacity slider
  const curOpacity = localStorage.getItem(BG_OPACITY_KEY) || '0.88';
  const sliderRow = document.createElement('div');
  sliderRow.className = 'info-field';
  sliderRow.innerHTML=`<span class="info-label">Overlay Darkness</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="range" min="0.5" max="0.95" step="0.01" value="${curOpacity}"
        style="width:120px;accent-color:var(--gold);"
        oninput="setBgOpacity(this.value)">
      <span style="font-family:'Cinzel',serif;font-size:0.7rem;color:var(--gold-dim);min-width:30px;">${Math.round(curOpacity*100)}%</span>
    </div>`;
  sliderRow.querySelector('input[type=range]').addEventListener('input', function() {
    sliderRow.querySelector('span:last-child').textContent = Math.round(this.value*100)+'%';
  });
  content.appendChild(sliderRow);
 
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
 
  const st2 = document.createElement('div'); st2.className='section-title'; st2.textContent='About';
  content.appendChild(st2);
  const about = document.createElement('div');
  about.style.cssText='text-align:center;padding:8px 0;color:var(--ink-dim);font-size:0.85rem;';
  about.innerHTML='The One Ring Character Sheet<br><span style="font-family:\'Cinzel\',serif;font-size:0.6rem;color:var(--gold-dim);letter-spacing:2px;">MIDDLE-EARTH RPG COMPANION</span>';
  content.appendChild(about);
}

function renderOnboardStep() {
  const c = document.getElementById('onboard-container');
  const steps = [stepWelcome, stepEdition, stepCulture, stepAttributes, stepDerived, stepSkills, stepCombatProf, stepFeatures, stepCalling, stepCallingSkills, stepGear, stepNameAge, stepReview];
  const totalSteps = steps.length;
 
  c.innerHTML = '';
 
  // Step indicator
  if(onboardStep > 0) {
    let dots = '<div class="onboard-step-indicator">';
    for(let i=1;i<totalSteps;i++) {
      const cls = i < onboardStep ? 'done' : (i === onboardStep ? 'active' : '');
      dots += `<div class="onboard-dot ${cls}"></div>`;
    }
    dots += '</div>';
    c.insertAdjacentHTML('beforeend', dots);
  }
 
  if(steps[onboardStep]) steps[onboardStep](c);
}

function finalizeOnboarding() {
  const cul = onboardState.culture;
  const cal = onboardState.calling;
  const row = cul.attributeRows[onboardState.attrRow];
  const attrs = [row[0], row[1], row[2]];
  const profNames = ['axes','bows','spears','swords'];
  const profChoice = cul.combatProfOptions[onboardState.combatProfChoice];
 
  // Create new character
  const id = generateId();
  const newData = JSON.parse(JSON.stringify(defaultData));
 
  newData.name = onboardState.name;
  newData.age = onboardState.age;
  newData.backstory = onboardState.backstory;
  newData.culture = cul.name;
  newData.blessing = cul.blessing;
  newData.calling = cal.name;
  newData.shadowPath = cal.shadowPath;
  newData.standardOfLiving = cul.standardOfLiving;
  newData.distinctiveFeatures = [...onboardState.features, cal.feature].join(', ');
 
  newData.strength = { tn: 20-attrs[0], rating: attrs[0], endurance: attrs[0] + cul.endurance[1] };
  newData.heart = { tn: 20-attrs[1], rating: attrs[1], hope: attrs[1] + cul.hope[1] };
  newData.wits = { tn: 20-attrs[2], rating: attrs[2], parry: attrs[2] + cul.parry[1] };
 
  newData.maxEndurance = attrs[cul.endurance[0]] + cul.endurance[1];
  newData.currentEndurance = newData.maxEndurance;
  newData.maxHope = attrs[cul.hope[0]] + cul.hope[1];
  newData.currentHope = newData.maxHope;
 
  // Skills
  for(const [sk, val] of Object.entries(cul.skills)) {
    newData.skills[sk] = { favoured: false, rank: val };
  }
  // Set favoured skills
  const favKey = onboardState.favouredSkill.toLowerCase();
  if(newData.skills[favKey]) newData.skills[favKey].favoured = true;
  onboardState.callingFavouredSkills.forEach(sk => {
    const k = sk.toLowerCase();
    if(newData.skills[k]) newData.skills[k].favoured = true;
  });
 
  // Combat proficiencies
  profChoice.forEach((val, i) => {
    newData.proficiencies[profNames[i]] = val;
  });
 
  newData.valour = 1;
  newData.wisdom = 1;
  
  // Apply gear from onboarding with real stats
  if(onboardState.gear) {
    const aName = onboardState.gear.armour || 'None';
    if(ARMOUR_DB[aName]) { newData.armour = {name:aName, protection:ARMOUR_DB[aName].protection, load:ARMOUR_DB[aName].load}; }
    const hName = onboardState.gear.helm || 'None';
    if(HELM_DB[hName]) { newData.helm = {name:hName==='None'?'':hName, protection:HELM_DB[hName].protection, load:HELM_DB[hName].load}; }
    const sName = onboardState.gear.shield || 'None';
    if(SHIELD_DB[sName]) { newData.shield = {name:sName==='None'?'':sName, parry:SHIELD_DB[sName].parry, load:SHIELD_DB[sName].load}; }
    onboardState.gear.weapons.forEach((wName,i) => {
      if(wName && WEAPONS_DB[wName] && newData.warGear[i]) {
        const w = WEAPONS_DB[wName];
        newData.warGear[i] = {name:wName, damage:w.damage, injury:w.injury, load:w.load, notes:w.notes};
      }
    });
  }
  if(onboardState.travelGear) newData.travellingGear = onboardState.travelGear;
 
  // Save
  const list = getCharList();
  list.push({id, name: newData.name});
  saveCharList(list);
  localStorage.setItem(charDataKey(id), JSON.stringify(newData));
 
  // Save portrait if uploaded
  if(onboardState.portraitData) {
    const imgData = { portrait: onboardState.portraitData, armour: null, weapons: null, shield: null, travel: null };
    localStorage.setItem(charImgKey(id), JSON.stringify(imgData));
  }
 
  // Switch to new character
  switchCharacter(id);
  closeOnboarding();
}
 
// ===== AUTO-SHOW ONBOARDING FOR NEW USERS =====
function checkOnboarding() {
  const list = getCharList();
  if(list.length === 1) {
    // Check if the single character is empty (just created by ensureCharacter)
    try {
      const d = JSON.parse(localStorage.getItem(charDataKey(list[0].id)));
      if(!d || !d.name) {
        // New user - show onboarding
        startOnboarding();
      }
    } catch(e) {
      startOnboarding();
    }
  }
}
 
// Also hook into createNewCharacter to offer onboarding
const _origCreateNew = createNewCharacter;
createNewCharacter = function() {
  // Ask if they want guided or manual
  startOnboarding();
};
 
// ===== INIT =====
loadBackground();
renderAttrDiamonds();
renderEquipDiamonds();
updateDisplay();
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeOnboarding();}});
checkOnboarding();
</script>
</body>
