<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tino Arcano — The One Ring</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: #8a7233;
  --gold-bright: #e8d48b;
  --parchment: #1a1611;
  --parchment-light: #2a2319;
  --ink: #d4c5a0;
  --ink-dim: #8a7e66;
  --ink-bright: #f0e6cc;
  --red: #8b3a3a;
  --red-bright: #c45050;
  --green: #4a7a4a;
  --green-bright: #6aaa6a;
  --blue: #4a6a8a;
  --blue-bright: #6a9aba;
  --panel-bg: rgba(20,16,10,0.85);
  --panel-border: rgba(201,168,76,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(74,106,138,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.app-container {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding: 12px;
  min-height: 100vh;
}

/* TOP BAR */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 1px solid var(--panel-border); margin-bottom: 16px;
}
.top-bar .char-name {
  font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700;
  color: var(--gold); letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
}
.top-bar .char-name:hover { color: var(--gold-bright); }
.menu-btn {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  padding: 6px 14px; font-family: 'Cinzel', serif; font-size: 0.75rem;
  cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s;
}
.menu-btn:hover { border-color: var(--gold); color: var(--gold); }

/* MAIN GRID */
.main-grid {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) minmax(280px, 420px) minmax(120px, 1fr);
  gap: 20px;
  align-items: start;
}

/* ===== TRI-DIAMOND CLUSTER (Attribute) ===== */
.attr-cluster {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  padding: 10px 0;
}
.attr-cluster:hover .main-diamond .d-shape { border-color: var(--gold); box-shadow: 0 0 18px rgba(201,168,76,0.3); }
.attr-cluster:hover .sub-diamond .d-shape { border-color: var(--gold); }
.attr-cluster.active .main-diamond .d-shape { border-color: var(--gold-bright); box-shadow: 0 0 22px rgba(201,168,76,0.4); background: rgba(201,168,76,0.08); }

.attr-label {
  font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--ink-dim);
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;
}

/* Main TN diamond */
.main-diamond {
  position: relative; width: 62px; height: 62px;
}
.main-diamond .d-shape {
  width: 100%; height: 100%; transform: rotate(45deg);
  border: 2px solid var(--gold-dim); background: var(--panel-bg);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.main-diamond .d-val {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold-bright);
  font-weight: 700;
}
.main-diamond .d-sublabel {
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 0.4rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; white-space: nowrap;
}

/* Sub diamonds (Rating + Endurance/Hope/Parry) */
.sub-diamonds {
  display: flex; gap: 24px; margin-top: -6px;
}
.sub-diamond {
  position: relative; width: 38px; height: 38px;
}
.sub-diamond .d-shape {
  width: 100%; height: 100%; transform: rotate(45deg);
  border: 1.5px solid var(--gold-dim); background: var(--panel-bg);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.sub-diamond .d-val {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold);
  font-weight: 600;
}
.sub-diamond .d-sublabel {
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 0.35rem; color: var(--ink-dim);
  letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
}

/* ATTRIBUTES LEFT */
.attributes-left {
  grid-column: 1; grid-row: 1;
  display: flex; flex-direction: column; gap: 30px;
  align-items: flex-end; padding-top: 20px;
}

/* ATTRIBUTES RIGHT */
.attributes-right {
  grid-column: 3; grid-row: 1;
  display: flex; flex-direction: column; gap: 30px;
  align-items: flex-start; padding-top: 20px;
}

/* ===== EQUIP DIAMOND (with image) ===== */
.equip-diamond {
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; position: relative; padding: 10px 0;
}
.equip-diamond .eq-shape {
  width: 56px; height: 56px; transform: rotate(45deg);
  border: 2px solid var(--gold-dim); background: var(--panel-bg);
  overflow: hidden; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.equip-diamond:hover .eq-shape { border-color: var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.3); }
.equip-diamond.active .eq-shape { border-color: var(--gold-bright); box-shadow: 0 0 20px rgba(201,168,76,0.4); }
.equip-diamond .eq-icon {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--gold);
  letter-spacing: 1px; text-align: center; font-weight: 600; line-height: 1.1;
}
.equip-diamond .eq-img {
  width: 140%; height: 140%; object-fit: cover; transform: rotate(-45deg) scale(1.2);
  filter: sepia(0.2) contrast(1.1);
}
.equip-diamond .eq-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 10px;
}

/* PORTRAIT */
.portrait-section {
  grid-column: 2; grid-row: 1;
  display: flex; flex-direction: column; align-items: center;
}
.portrait-frame {
  position: relative; width: 240px; height: 340px; overflow: hidden;
  border: 2px solid var(--gold-dim);
  box-shadow: 0 0 30px rgba(201,168,76,0.15), inset 0 0 20px rgba(0,0,0,0.5);
  cursor: pointer;
}
.portrait-frame::before {
  content: ''; position: absolute; inset: 3px;
  border: 1px solid rgba(201,168,76,0.2); z-index: 2; pointer-events: none;
}
.portrait-frame img {
  width: 100%; height: 100%; object-fit: cover; object-position: top center;
  filter: sepia(0.1) contrast(1.05);
}
.portrait-frame .change-hint {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); color: var(--gold-dim);
  font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; padding: 6px;
  opacity: 0; transition: opacity 0.3s; z-index: 3;
}
.portrait-frame:hover .change-hint { opacity: 1; }
.portrait-title {
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold-dim);
  letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; text-align: center;
}

/* Resource bars */
.resource-section {
  display: flex; flex-direction: column; gap: 10px; align-items: center;
  margin-top: 16px; width: 100%;
}
.resource-bar {
  display: flex; align-items: center; gap: 10px; cursor: pointer; width: 100%;
  max-width: 500px;
}
.resource-bar .rb-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; min-width: 75px; text-align: right;
}
.resource-bar .rb-track {
  flex: 1; height: 8px; background: rgba(201,168,76,0.1);
  border: 1px solid var(--panel-border); position: relative; overflow: hidden;
}
.resource-bar .rb-fill { height: 100%; transition: width 0.5s; }
.rb-fill.endurance { background: linear-gradient(90deg, var(--green), var(--green-bright)); }
.rb-fill.hope { background: linear-gradient(90deg, var(--blue), var(--blue-bright)); }
.resource-bar .rb-val {
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--ink);
  min-width: 55px; text-align: left;
}

/* BOTTOM SECTION */
.bottom-section { grid-column: 1 / -1; }
.divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--panel-border), transparent); margin: 12px 0; }
.condition-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.condition-toggle {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 4px 8px; border: 1px solid transparent; transition: all 0.2s;
}
.condition-toggle:hover { border-color: var(--panel-border); }
.condition-toggle .ct-box {
  width: 12px; height: 12px; border: 1px solid var(--gold-dim);
  transform: rotate(45deg); transition: all 0.2s;
}
.condition-toggle.active .ct-box { background: var(--red-bright); border-color: var(--red-bright); box-shadow: 0 0 6px rgba(196,80,80,0.4); }
.condition-toggle .ct-label {
  font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--ink-dim);
  letter-spacing: 1px; text-transform: uppercase;
}
.condition-toggle.active .ct-label { color: var(--red-bright); }

/* ===== SLIDE PANEL ===== */
.panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
  opacity: 0; visibility: hidden; transition: all 0.3s;
}
.panel-overlay.open { opacity: 1; visibility: visible; }
.slide-panel {
  position: fixed; bottom: 0; left: 0; right: 0; max-height: 78vh;
  background: linear-gradient(to bottom, #1e1a13, #15120d);
  border-top: 2px solid var(--gold-dim); z-index: 101;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto; padding: 0 16px 24px;
}
.slide-panel.open { transform: translateY(0); }
.panel-header {
  position: sticky; top: 0;
  background: linear-gradient(to bottom, #1e1a13, rgba(30,26,19,0.95));
  padding: 16px 0 12px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--panel-border); margin-bottom: 16px; z-index: 5;
}
.panel-title {
  font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold);
  letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
}
.panel-close {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  width: 32px; height: 32px; cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.panel-close:hover { border-color: var(--gold); color: var(--gold); }

/* Stat rows */
.stat-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.stat-row:last-child { border-bottom: none; }
.stat-name {
  font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink);
  display: flex; align-items: center; gap: 10px;
}
.stat-controls { display: flex; align-items: center; gap: 6px; }
.stat-val {
  font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-bright);
  min-width: 28px; text-align: center; font-weight: 600;
}
.stat-btn {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  width: 28px; height: 28px; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: 'Cinzel', serif;
}
.stat-btn:hover { border-color: var(--gold); color: var(--gold); }
.stat-btn:active { background: rgba(201,168,76,0.15); }

/* Favoured checkbox */
.favour-check {
  width: 16px; height: 16px; transform: rotate(45deg);
  border: 1px solid var(--gold-dim); background: none; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0; appearance: none; -webkit-appearance: none;
}
.favour-check:checked { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.4); }

/* Mini diamonds in panel */
.mini-diamonds { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; }
.mini-diamond { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.mini-diamond .md-shape {
  width: 44px; height: 44px; transform: rotate(45deg);
  border: 1.5px solid var(--gold-dim); background: var(--panel-bg);
  display: flex; align-items: center; justify-content: center;
}
.mini-diamond .md-val {
  transform: rotate(-45deg);
  font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-bright); font-weight: 700;
}
.mini-diamond .md-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 6px;
}

/* Skill dots */
.skill-dots { display: flex; gap: 3px; align-items: center; }
.skill-dot {
  width: 10px; height: 10px; transform: rotate(45deg);
  border: 1px solid var(--gold-dim); cursor: pointer; transition: all 0.2s;
}
.skill-dot.filled { background: var(--gold); }
.skill-dot:hover { border-color: var(--gold-bright); }
.prof-dots { display: flex; gap: 2px; }
.prof-dot {
  width: 8px; height: 8px; transform: rotate(45deg);
  border: 1px solid var(--gold-dim); cursor: pointer; transition: all 0.2s;
}
.prof-dot.filled { background: var(--gold); }

.section-title {
  font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--gold-dim);
  letter-spacing: 3px; text-transform: uppercase; text-align: center; margin: 12px 0 8px;
}
.info-field {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.info-label {
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--ink-dim);
  letter-spacing: 2px; text-transform: uppercase;
}
.info-value {
  font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink-bright);
  background: none; border: none; border-bottom: 1px solid transparent;
  text-align: right; padding: 2px 4px; max-width: 60%; transition: all 0.2s;
}
.info-value:focus { outline: none; border-bottom-color: var(--gold-dim); color: var(--gold-bright); }

/* Image upload button in panel */
.img-upload-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.img-upload-btn {
  background: none; border: 1px solid var(--panel-border); color: var(--gold-dim);
  padding: 5px 12px; font-family: 'Cinzel', serif; font-size: 0.65rem;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
}
.img-upload-btn:hover { border-color: var(--gold); color: var(--gold); }
.img-clear-btn {
  background: none; border: 1px solid rgba(139,58,58,0.4); color: var(--red);
  padding: 5px 10px; font-family: 'Cinzel', serif; font-size: 0.6rem;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; margin-left: 6px;
}
.img-clear-btn:hover { border-color: var(--red-bright); color: var(--red-bright); }

/* Scrollbar */
.slide-panel::-webkit-scrollbar { width: 4px; }
.slide-panel::-webkit-scrollbar-track { background: var(--parchment); }
.slide-panel::-webkit-scrollbar-thumb { background: var(--gold-dim); }

/* Hidden file input */
.hidden-input { display: none; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .main-grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .portrait-section { grid-column: 1; grid-row: 1; }
  .attributes-left {
    grid-column: 1; grid-row: 2;
    flex-direction: row; justify-content: center; align-items: flex-start;
    gap: 28px; padding-top: 0;
  }
  .attributes-right {
    grid-column: 1; grid-row: 3;
    flex-direction: row; justify-content: center; align-items: flex-start;
    gap: 28px; padding-top: 0; flex-wrap: wrap;
  }
  .bottom-section { grid-column: 1; grid-row: 4; }
  .portrait-frame { width: 200px; height: 280px; }
  .main-diamond { width: 52px; height: 52px; }
  .main-diamond .d-val { font-size: 1rem; }
  .sub-diamond { width: 32px; height: 32px; }
  .sub-diamond .d-val { font-size: 0.75rem; }
  .sub-diamonds { gap: 18px; }
  .top-bar .char-name { font-size: 1.1rem; letter-spacing: 2px; }
  .equip-diamond .eq-shape { width: 48px; height: 48px; }
}
</style>
</head>

    <div style="display:flex;gap:8px;">
      <button class="menu-btn" onclick="openPanel('status')">Status</button>
      <button class="menu-btn" onclick="openPanel('info')">Info</button>
    </div>
  </div>

  <div class="main-grid">

<script>
const STORAGE_KEY = 'tor_tino_character';
const IMG_KEY = 'tor_tino_images';

const defaultData = {
  name: '', culture: '', blessing: '', calling: '', shadowPath: '',
  standardOfLiving: '', patron: '', distinctiveFeatures: '', treasure: 0,
  age: '', flaws: '',
  strength: { tn: 0, rating: 0, endurance: 0 },
  heart: { tn: 0, rating: 0, hope: 0 },
  wits: { tn: 0, rating: 0, parry: 0 },
  currentEndurance: 0, maxEndurance: 0, fatigue: 0, load: 0,
  currentHope: 0, maxHope: 0, shadowPoints: 0, shadowScars: 0,
  adventurePoints: 0, skillPoints: 0, fellowshipScore: 0,
  valour: 0, wisdom: 0,
  skills: {
    awe:{favoured:false,rank:0}, athletics:{favoured:false,rank:0},
    awareness:{favoured:false,rank:0}, hunting:{favoured:false,rank:0},
    song:{favoured:false,rank:0}, craft:{favoured:false,rank:0},
    enhearten:{favoured:false,rank:0}, travel:{favoured:false,rank:0},
    insight:{favoured:false,rank:0}, healing:{favoured:false,rank:0},
    courtesy:{favoured:false,rank:0}, battle:{favoured:false,rank:0},
    persuade:{favoured:false,rank:0}, stealth:{favoured:false,rank:0},
    scan:{favoured:false,rank:0}, explore:{favoured:false,rank:0},
    riddle:{favoured:false,rank:0}, lore:{favoured:false,rank:0},
  },
  proficiencies: { axes:0, bows:0, spears:0, swords:0 },
  warGear: [
    { name:'', damage:0, injury:0, load:0, notes:'' },
    { name:'', damage:0, injury:0, load:0, notes:'' },
    { name:'', damage:0, injury:0, load:0, notes:'' },
  ],
  armour: { name:'', protection:0, load:0 },
  helm: { name:'', protection:0, load:0 },
  shield: { name:'', parry:0, load:0 },
  rewards: '', virtues: '', travellingGear: '',
  conditions: { weary:false, miserable:false, wounded:false, injury:'' },
};

let data = loadData();
let images = loadImages();

function loadData() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) return JSON.parse(s); } catch(e){}
  return JSON.parse(JSON.stringify(defaultData));
}
function loadImages() {
  try { const s = localStorage.getItem(IMG_KEY); if(s) return JSON.parse(s); } catch(e){}
  return { portrait: null, armour: null, weapons: null, shield: null, travel: null };
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
  updateDisplay();
}
function saveImages() {
  try { localStorage.setItem(IMG_KEY, JSON.stringify(images)); } catch(e){}
}

// ===== IMAGE HANDLING =====
function triggerPortraitUpload() { document.getElementById('portrait-upload').click(); }

function handlePortraitUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    // Resize for storage
    resizeImage(ev.target.result, 400, 550, function(resized) {
      images.portrait = resized;
      saveImages();
      document.getElementById('portrait-img').src = resized;
    });
  };
  reader.readAsDataURL(file);
}

function handleEquipImgUpload(e, key) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    resizeImage(ev.target.result, 120, 120, function(resized) {
      images[key] = resized;
      saveImages();
      renderEquipDiamonds();
    });
  };
  reader.readAsDataURL(file);
}

function resizeImage(dataUrl, maxW, maxH, cb) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    let w = img.width, h = img.height;
    if(w > maxW) { h = h*(maxW/w); w = maxW; }
    if(h > maxH) { w = w*(maxH/h); h = maxH; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', 0.7));
  };
  img.src = dataUrl;
}

// ===== RENDER ATTRIBUTE TRI-DIAMONDS =====
function renderAttrDiamonds() {
  const left = document.getElementById('attr-left');
  const attrs = [
    { key:'strength', label:'Strength', tnKey:'tn', sub1Key:'rating', sub1Label:'Rating', sub2Key:'endurance', sub2Label:'Endurance' },
    { key:'heart', label:'Heart', tnKey:'tn', sub1Key:'rating', sub1Label:'Rating', sub2Key:'hope', sub2Label:'Hope' },
    { key:'wits', label:'Wits', tnKey:'tn', sub1Key:'rating', sub1Label:'Rating', sub2Key:'parry', sub2Label:'Parry' },
  ];

  left.innerHTML = attrs.map(a => {
    const d = data[a.key];
    return `<div class="attr-cluster" onclick="openPanel('${a.key}')" id="cluster-${a.key}">
      <span class="attr-label">${a.label}</span>
      <div class="main-diamond">
        <div class="d-shape"><span class="d-val" id="hd-${a.key}-tn">${d.tn || '—'}</span></div>
        <span class="d-sublabel">TN</span>
      </div>
      <div class="sub-diamonds">
        <div class="sub-diamond">
          <div class="d-shape"><span class="d-val" id="hd-${a.key}-${a.sub1Key}">${d[a.sub1Key] || '—'}</span></div>
          <span class="d-sublabel">${a.sub1Label}</span>
        </div>
        <div class="sub-diamond">
          <div class="d-shape"><span class="d-val" id="hd-${a.key}-${a.sub2Key}">${d[a.sub2Key] || '—'}</span></div>
          <span class="d-sublabel">${a.sub2Label}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== RENDER EQUIPMENT DIAMONDS =====
function renderEquipDiamonds() {
  const right = document.getElementById('attr-right');
  const equips = [
    { key:'armour', label:'Armour', fallback:'ARM' },
    { key:'shield', label:'Shield', fallback:'SHD' },
    { key:'weapons', label:'War Gear', fallback:'WPN' },
    { key:'travel', label:'Travel', fallback:'TRV' },
  ];

  right.innerHTML = equips.map(eq => {
    const hasImg = images[eq.key];
    const inner = hasImg
      ? `<img class="eq-img" src="${images[eq.key]}" alt="${eq.label}">`
      : `<span class="eq-icon">${eq.fallback}</span>`;
    return `<div class="equip-diamond" onclick="openPanel('${eq.key}')" id="eqdiamond-${eq.key}">
      <div class="eq-shape">${inner}</div>
      <span class="eq-label">${eq.label}</span>
    </div>`;
  }).join('');
}

// ===== DISPLAY UPDATE =====
function updateDisplay() {
  const endMax = data.maxEndurance || 1, endCur = data.currentEndurance || 0;
  const hopeMax = data.maxHope || 1, hopeCur = data.currentHope || 0;
  document.getElementById('end-bar').style.width = (endMax>0?(endCur/endMax)*100:0)+'%';
  document.getElementById('hope-bar').style.width = (hopeMax>0?(hopeCur/hopeMax)*100:0)+'%';
  document.getElementById('end-display').textContent = endCur+' / '+(data.maxEndurance||'—');
  document.getElementById('hope-display').textContent = hopeCur+' / '+(data.maxHope||'—');
  if(data.name) document.querySelector('.char-name').textContent = data.name;
  if(data.culture || data.calling) {
    document.getElementById('portrait-subtitle').textContent = (data.culture||'—')+' \u2022 '+(data.calling||'—');
  }

  // Update home-screen diamond values
  ['strength','heart','wits'].forEach(key => {
    const d = data[key];
    const tnEl = document.getElementById('hd-'+key+'-tn');
    if(tnEl) tnEl.textContent = d.tn || '—';
    const map = {strength:'endurance',heart:'hope',wits:'parry'};
    const rEl = document.getElementById('hd-'+key+'-rating');
    if(rEl) rEl.textContent = d.rating || '—';
    const tEl = document.getElementById('hd-'+key+'-'+map[key]);
    if(tEl) tEl.textContent = d[map[key]] || '—';
  });

  // Portrait
  const pImg = document.getElementById('portrait-img');
  if(images.portrait) pImg.src = images.portrait;

  renderConditions();
}

function renderConditions() {
  const row = document.getElementById('conditions-row');
  row.innerHTML = ['weary','miserable','wounded'].map(c =>
    `<div class="condition-toggle ${data.conditions[c]?'active':''}" onclick="toggleCondition('${c}')">
      <div class="ct-box"></div><span class="ct-label">${c}</span>
    </div>`
  ).join('');
}
function toggleCondition(c) { data.conditions[c]=!data.conditions[c]; saveData(); }

// ===== PANEL SYSTEM =====
let currentPanel = null;

function openPanel(type) {
  currentPanel = type;
  document.querySelectorAll('.attr-cluster,.equip-diamond').forEach(b=>b.classList.remove('active'));
  const clId = document.getElementById('cluster-'+type);
  if(clId) clId.classList.add('active');
  const eqId = document.getElementById('eqdiamond-'+type);
  if(eqId) eqId.classList.add('active');

  const titles = {
    strength:'Strength',heart:'Heart',wits:'Wits',
    armour:'Armour & Helm',shield:'Shield',weapons:'War Gear',travel:'Travelling Gear',
    info:'Character Info',status:'Status & Points',
  };
  document.getElementById('panel-title').textContent = titles[type]||type;
  const content = document.getElementById('panel-content');
  content.innerHTML = '';

  const builders = {strength:buildStrength,heart:buildHeart,wits:buildWits,
    armour:buildArmour,shield:buildShield,weapons:buildWeapons,travel:buildTravel,
    info:buildInfo,status:buildStatus};
  if(builders[type]) builders[type](content);

  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('slide-panel').classList.add('open');
}
function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('slide-panel').classList.remove('open');
  document.querySelectorAll('.attr-cluster,.equip-diamond').forEach(b=>b.classList.remove('active'));
  currentPanel = null;
}

// ===== BUILDER HELPERS =====
function numStat(label, get, set, parent) {
  const row = document.createElement('div'); row.className='stat-row';
  row.innerHTML=`<span class="stat-name">${label}</span>
    <div class="stat-controls">
      <button class="stat-btn" data-dir="-1">\u2212</button>
      <span class="stat-val">${get()}</span>
      <button class="stat-btn" data-dir="1">+</button>
    </div>`;
  row.querySelectorAll('.stat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      set(get()+parseInt(btn.dataset.dir));
      row.querySelector('.stat-val').textContent=get();
      saveData();
    });
  });
  parent.appendChild(row);
}

function skillRow(key, parent) {
  const s=data.skills[key]; const row=document.createElement('div'); row.className='stat-row';
  const label=key.charAt(0).toUpperCase()+key.slice(1);
  let dots='';for(let i=0;i<6;i++) dots+=`<div class="skill-dot ${i<s.rank?'filled':''}" data-idx="${i}"></div>`;
  row.innerHTML=`<span class="stat-name"><input type="checkbox" class="favour-check" ${s.favoured?'checked':''}>${label}</span><div class="skill-dots">${dots}</div>`;
  row.querySelector('.favour-check').addEventListener('change',e=>{data.skills[key].favoured=e.target.checked;saveData();});
  row.querySelectorAll('.skill-dot').forEach(dot=>{
    dot.addEventListener('click',()=>{
      const idx=parseInt(dot.dataset.idx);
      data.skills[key].rank=(idx+1===s.rank)?idx:idx+1;
      saveData();
      row.querySelectorAll('.skill-dot').forEach((d,i)=>d.classList.toggle('filled',i<data.skills[key].rank));
    });
  });
  parent.appendChild(row);
}

function buildAttributePanel(content, attrKey, thirdKey, thirdLabel, skills) {
  const dCont=document.createElement('div'); dCont.className='mini-diamonds';
  const fields=[
    {key:'tn',label:'TN',get:()=>data[attrKey].tn,set:v=>{data[attrKey].tn=v;}},
    {key:'rating',label:'Rating',get:()=>data[attrKey].rating,set:v=>{data[attrKey].rating=v;}},
    {key:thirdKey,label:thirdLabel,get:()=>data[attrKey][thirdKey],set:v=>{data[attrKey][thirdKey]=v;}},
  ];
  fields.forEach(f=>{
    const md=document.createElement('div'); md.className='mini-diamond';
    md.innerHTML=`<div class="md-shape"><span class="md-val">${f.get()}</span></div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:4px;">
        <button class="stat-btn" style="width:22px;height:22px;font-size:0.8rem;" data-dir="-1">\u2212</button>
        <button class="stat-btn" style="width:22px;height:22px;font-size:0.8rem;" data-dir="1">+</button>
      </div><span class="md-label">${f.label}</span>`;
    md.querySelectorAll('.stat-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        f.set(f.get()+parseInt(btn.dataset.dir));
        md.querySelector('.md-val').textContent=f.get();
        saveData();
      });
    });
    dCont.appendChild(md);
  });
  content.appendChild(dCont);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const st=document.createElement('div');st.className='section-title';st.textContent='Skills';
  content.appendChild(st);
  skills.forEach(s=>skillRow(s,content));
}

function addImageUploadRow(content, imgKey, label) {
  const row = document.createElement('div'); row.className='img-upload-row';
  row.innerHTML=`<span class="info-label">${label} Image</span>
    <div>
      <button class="img-upload-btn" onclick="document.getElementById('upload-${imgKey}').click()">Upload</button>
      ${images[imgKey]?'<button class="img-clear-btn" onclick="clearEquipImage(\''+imgKey+'\')">Clear</button>':''}
    </div>`;
  content.appendChild(row);
}

function clearEquipImage(key) {
  images[key] = null; saveImages(); renderEquipDiamonds();
  if(currentPanel) openPanel(currentPanel); // refresh panel
}

// ===== PANEL BUILDERS =====
function buildStrength(content) {
  buildAttributePanel(content,'strength','endurance','Endurance',
    ['awe','athletics','awareness','hunting','song','craft']);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const st=document.createElement('div');st.className='section-title';st.textContent='Combat Proficiencies';
  content.appendChild(st);
  Object.keys(data.proficiencies).forEach(key=>{
    const row=document.createElement('div');row.className='stat-row';
    const label=key.charAt(0).toUpperCase()+key.slice(1);
    let dots='';for(let i=0;i<6;i++) dots+=`<div class="prof-dot ${i<data.proficiencies[key]?'filled':''}" data-idx="${i}"></div>`;
    row.innerHTML=`<span class="stat-name">${label}</span><div class="prof-dots">${dots}</div>`;
    row.querySelectorAll('.prof-dot').forEach(dot=>{
      dot.addEventListener('click',()=>{
        const idx=parseInt(dot.dataset.idx);
        data.proficiencies[key]=(idx+1===data.proficiencies[key])?idx:idx+1;
        saveData();
        row.querySelectorAll('.prof-dot').forEach((d,i)=>d.classList.toggle('filled',i<data.proficiencies[key]));
      });
    });
    content.appendChild(row);
  });
}
function buildHeart(content) {
  buildAttributePanel(content,'heart','hope','Hope',
    ['enhearten','travel','insight','healing','courtesy','battle']);
}
function buildWits(content) {
  buildAttributePanel(content,'wits','parry','Parry',
    ['persuade','stealth','scan','explore','riddle','lore']);
}

function buildArmour(content) {
  addImageUploadRow(content, 'armour', 'Armour');
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  [{label:'Armour',obj:data.armour,fields:['name','protection','load']},
   {label:'Helm',obj:data.helm,fields:['name','protection','load']}].forEach(sec=>{
    const st=document.createElement('div');st.className='section-title';st.textContent=sec.label;
    content.appendChild(st);
    const nr=document.createElement('div');nr.className='info-field';
    nr.innerHTML=`<span class="info-label">Name</span><input class="info-value" value="${sec.obj.name}" placeholder="\u2014">`;
    nr.querySelector('input').addEventListener('change',e=>{sec.obj.name=e.target.value;saveData();});
    content.appendChild(nr);
    sec.fields.filter(f=>f!=='name').forEach(f=>{
      numStat(f.charAt(0).toUpperCase()+f.slice(1),()=>sec.obj[f],v=>{sec.obj[f]=v;},content);
    });
    content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  });
}

function buildShield(content) {
  addImageUploadRow(content, 'shield', 'Shield');
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const st=document.createElement('div');st.className='section-title';st.textContent='Shield';
  content.appendChild(st);
  const nr=document.createElement('div');nr.className='info-field';
  nr.innerHTML=`<span class="info-label">Name</span><input class="info-value" value="${data.shield.name}" placeholder="\u2014">`;
  nr.querySelector('input').addEventListener('change',e=>{data.shield.name=e.target.value;saveData();});
  content.appendChild(nr);
  numStat('Parry',()=>data.shield.parry,v=>{data.shield.parry=v;},content);
  numStat('Load',()=>data.shield.load,v=>{data.shield.load=v;},content);
}

function buildWeapons(content) {
  addImageUploadRow(content, 'weapons', 'War Gear');
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  data.warGear.forEach((wep,idx)=>{
    const st=document.createElement('div');st.className='section-title';st.textContent=`Weapon ${idx+1}`;
    content.appendChild(st);
    const nr=document.createElement('div');nr.className='info-field';
    nr.innerHTML=`<span class="info-label">Name</span><input class="info-value" value="${wep.name}" placeholder="\u2014">`;
    nr.querySelector('input').addEventListener('change',e=>{data.warGear[idx].name=e.target.value;saveData();});
    content.appendChild(nr);
    ['damage','injury','load'].forEach(f=>{
      numStat(f.charAt(0).toUpperCase()+f.slice(1),()=>data.warGear[idx][f],v=>{data.warGear[idx][f]=v;},content);
    });
    const noR=document.createElement('div');noR.className='info-field';
    noR.innerHTML=`<span class="info-label">Notes</span><input class="info-value" value="${wep.notes}" placeholder="\u2014">`;
    noR.querySelector('input').addEventListener('change',e=>{data.warGear[idx].notes=e.target.value;saveData();});
    content.appendChild(noR);
    content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  });
}

function buildTravel(content) {
  addImageUploadRow(content, 'travel', 'Travel');
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const ta=document.createElement('div');
  ta.innerHTML=`<div class="section-title">Travelling Gear</div>
    <textarea style="width:100%;min-height:120px;background:var(--panel-bg);border:1px solid var(--panel-border);color:var(--ink);font-family:'Cormorant Garamond',serif;font-size:1rem;padding:10px;resize:vertical;"
      placeholder="List your travelling gear...">${data.travellingGear}</textarea>`;
  ta.querySelector('textarea').addEventListener('change',e=>{data.travellingGear=e.target.value;saveData();});
  content.appendChild(ta);
}

function buildInfo(content) {
  [{l:'Name',k:'name'},{l:'Heroic Culture',k:'culture'},{l:'Cultural Blessing',k:'blessing'},
   {l:'Calling',k:'calling'},{l:'Shadow Path',k:'shadowPath'},{l:'Standard of Living',k:'standardOfLiving'},
   {l:'Age',k:'age'},{l:'Patron',k:'patron'},{l:'Distinctive Features',k:'distinctiveFeatures'},
   {l:'Flaws',k:'flaws'}].forEach(f=>{
    const row=document.createElement('div');row.className='info-field';
    row.innerHTML=`<span class="info-label">${f.l}</span><input class="info-value" value="${data[f.k]}" placeholder="\u2014">`;
    row.querySelector('input').addEventListener('change',e=>{data[f.k]=e.target.value;saveData();});
    content.appendChild(row);
  });
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  numStat('Treasure',()=>data.treasure,v=>{data.treasure=v;},content);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  ['rewards','virtues'].forEach(key=>{
    const row=document.createElement('div');row.className='info-field';
    row.innerHTML=`<span class="info-label">${key.charAt(0).toUpperCase()+key.slice(1)}</span><input class="info-value" value="${data[key]}" placeholder="\u2014">`;
    row.querySelector('input').addEventListener('change',e=>{data[key]=e.target.value;saveData();});
    content.appendChild(row);
  });
  const rd=document.createElement('div');rd.style.cssText='margin-top:24px;text-align:center;';
  rd.innerHTML=`<button class="menu-btn" style="color:var(--red);border-color:var(--red);" onclick="if(confirm('Reset ALL character data and images?')){localStorage.removeItem('${STORAGE_KEY}');localStorage.removeItem('${IMG_KEY}');location.reload();}">Reset All Data</button>`;
  content.appendChild(rd);
}

function buildStatus(content) {
  const st1=document.createElement('div');st1.className='section-title';st1.textContent='Resources';
  content.appendChild(st1);
  numStat('Current Endurance',()=>data.currentEndurance,v=>{data.currentEndurance=Math.max(0,v);},content);
  numStat('Max Endurance',()=>data.maxEndurance,v=>{data.maxEndurance=v;},content);
  numStat('Load',()=>data.load,v=>{data.load=v;},content);
  numStat('Fatigue',()=>data.fatigue,v=>{data.fatigue=v;},content);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  numStat('Current Hope',()=>data.currentHope,v=>{data.currentHope=Math.max(0,v);},content);
  numStat('Max Hope',()=>data.maxHope,v=>{data.maxHope=v;},content);
  numStat('Shadow Points',()=>data.shadowPoints,v=>{data.shadowPoints=v;},content);
  numStat('Shadow Scars',()=>data.shadowScars,v=>{data.shadowScars=v;},content);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const st2=document.createElement('div');st2.className='section-title';st2.textContent='Points & Scores';
  content.appendChild(st2);
  numStat('Adventure Points',()=>data.adventurePoints,v=>{data.adventurePoints=v;},content);
  numStat('Skill Points',()=>data.skillPoints,v=>{data.skillPoints=v;},content);
  numStat('Fellowship Score',()=>data.fellowshipScore,v=>{data.fellowshipScore=v;},content);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const st3=document.createElement('div');st3.className='section-title';st3.textContent='Rewards';
  content.appendChild(st3);
  numStat('Valour',()=>data.valour,v=>{data.valour=v;},content);
  numStat('Wisdom',()=>data.wisdom,v=>{data.wisdom=v;},content);
  content.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  const st4=document.createElement('div');st4.className='section-title';st4.textContent='Conditions';
  content.appendChild(st4);
  ['weary','miserable','wounded'].forEach(c=>{
    const row=document.createElement('div');row.className='stat-row';
    row.innerHTML=`<span class="stat-name">${c.charAt(0).toUpperCase()+c.slice(1)}</span>
      <div class="condition-toggle ${data.conditions[c]?'active':''}" style="padding:0;">
        <div class="ct-box"></div></div>`;
    row.querySelector('.condition-toggle').addEventListener('click',e=>{
      data.conditions[c]=!data.conditions[c];
      e.currentTarget.classList.toggle('active');
      saveData();
    });
    content.appendChild(row);
  });
  const injRow=document.createElement('div');injRow.className='info-field';
  injRow.innerHTML=`<span class="info-label">Injury</span><input class="info-value" value="${data.conditions.injury}" placeholder="\u2014">`;
  injRow.querySelector('input').addEventListener('change',e=>{data.conditions.injury=e.target.value;saveData();});
  content.appendChild(injRow);
}

// ===== INIT =====
renderAttrDiamonds();
renderEquipDiamonds();
updateDisplay();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
</script>
</body>
</html>
